server:
  port: 8080

spring:
  application:
    name: knowledge-back
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  datasource:
    url: jdbc:h2:file:./data/knowledge_back;MODE=MySQL;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  elasticsearch:
    baseUrl: http://localhost:9200
    index: knowledge_chunks
  qdrant:
    baseUrl: http://localhost:6333
    collection: knowledge_chunks
  modelService:
    baseUrl: http://localhost:8000
  indexing:
    # 默认复用你现有的 processed 数据（可改成别的 JSONL）
    sourceJsonlPath: ../knowledge_rag/data/processed/virtual_articles.jsonl
    embedBatchSize: 64
