server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: knowledge-back
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  datasource:
    # MySQL 配置
    url: jdbc:mysql://localhost:3306/knowledge_base?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  sql:
    init:
      mode: never
      # 每次启动都运行schema.sql (注意:如果你想保留数据, 请改为 never 或使用 Flyway)
      # 由于schema.sql中有 DROP TABLE IF EXISTS, 每次启动都会清空数据重建表结构
      # 开发阶段方便调试, 生产环境请务必修改
      schema-locations: classpath:schema.sql
  jpa:
    hibernate:
      ddl-auto: none # 使用schema.sql管理表结构, 禁用Hibernate自动更新
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  # h2:
  #   console:
  #     enabled: true
  #     path: /h2

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  elasticsearch:
    baseUrl: http://localhost:9200
    index: knowledge_chunks
  qdrant:
    baseUrl: http://localhost:6333
    collection: knowledge_chunks
  modelService:
    baseUrl: http://localhost:8000
  indexing:
    # 默认复用你现有的 processed 数据（可改成别的 JSONL）
    sourceJsonlPath: ../knowledge_rag/data/processed/virtual_articles.jsonl
    embedBatchSize: 64
  llm:
    baseUrl: https://api.siliconflow.cn/v1
    apiKey: ${DEEPSEEK_API_KEY:}
    model: deepseek-ai/DeepSeek-V3
  auth:
    tokenSecret: ${APP_AUTH_TOKEN_SECRET:change-this-secret-in-production}
    tokenTtlSeconds: 43200
